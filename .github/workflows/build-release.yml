name: Build EXE
on: [push]

jobs:
  build:
    runs-on: windows-latest  # Use Windows to generate a .exe file
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller -r requirements.txt  # Ensure your script's dependencies are listed

      - name: Build with PyInstaller
        run: pyinstaller --onefile vidsender.py  # Replace 'main.py' with your script name

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-executable
          path: dist/*.exe
